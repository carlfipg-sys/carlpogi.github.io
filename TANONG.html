<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Me?</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    h1 {
        color: #fff;
        margin-bottom: 30px;
        font-size: 2.5rem;
    }

    button {
        padding: 12px 30px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.2s;
    }

    #yesBtn {
        background: #28a745;
        color: white;
        margin-right: 20px;
    }

    #noBtn {
        background: #dc3545;
        color: white;
        position: absolute;
    }

    #message {
        margin-top: 30px;
        color: white;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Will you go on a date with me? ❤️</h1>

    <button id="yesBtn">YES</button>
    <button id="noBtn">NO</button>

    <div id="message"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

const messages = [
    "NO",
    "Are you sure? 🤔",
    "Really? 😢",
    "Think again 😅",
    "Please? 🥺",
    "Pretty please? 🥺👉👈",
    "Don't break my heart 💔",
    "You want to? ",
    "I'm running out of places to hide 😭",
    "Just click YES already ❤️"
];

let messageIndex = 0;

// Initial position
noBtn.style.left = "55%";
noBtn.style.top = "52%";

noBtn.addEventListener("mouseover", () => {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";

    // Change text every move
    messageIndex++;

    if (messageIndex < messages.length) {
        noBtn.textContent = messages[messageIndex];
    } else {
        noBtn.textContent =
            messages[Math.floor(Math.random() * (messages.length - 1)) + 1];
    }
});

// YES button action
yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <style>
            body{
                margin:0;
                overflow:hidden;
                font-family:'Segoe UI',sans-serif;
                background:linear-gradient(
                    135deg,
                    #ff5f9e,
                    #ff85a2,
                    #ffc3d6,
                    #ffdbe9
                );
                background-size:400% 400%;
                animation:bgMove 12s ease infinite;
            }

            @keyframes bgMove{
                0%{background-position:0% 50%;}
                50%{background-position:100% 50%;}
                100%{background-position:0% 50%;}
            }

            .container{
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                flex-direction:column;
                text-align:center;
                color:white;
                position:relative;
                z-index:2;
            }

            .card{
                background:rgba(255,255,255,0.15);
                backdrop-filter:blur(12px);
                padding:40px;
                border-radius:25px;
                box-shadow:0 8px 32px rgba(0,0,0,.15);
                animation:pop .8s ease;
            }

            @keyframes pop{
                from{
                    transform:scale(.5);
                    opacity:0;
                }
                to{
                    transform:scale(1);
                    opacity:1;
                }
            }

            h1{
                font-size:4rem;
                margin:0;
            }

            h2{
                margin:10px 0;
                font-weight:500;
            }

            p{
                font-size:1.2rem;
                opacity:.95;
            }

            .heart{
                position:absolute;
                font-size:30px;
                animation:float 8s linear infinite;
                opacity:.8;
            }

            @keyframes float{
                from{
                    transform:translateY(100vh) rotate(0deg);
                }
                to{
                    transform:translateY(-120px) rotate(360deg);
                }
            }
        </style>

        <div class="container">
            <div class="card">
                <h1>❤️ YAY! ❤️</h1>
                <h2>You just made my day 🥰</h2>
                <p>
                    Congratulations! 🎉<br>
                    You officially agreed to go on a date with me.
                </p>
                <p>
                    Get ready for laughter, memories,
                    and maybe a little bit of romance 🌹✨
                </p>
            </div>
        </div>

        <div class="heart" style="left:5%;animation-delay:0s;">❤️</div>
        <div class="heart" style="left:15%;animation-delay:1s;">💖</div>
        <div class="heart" style="left:30%;animation-delay:2s;">💕</div>
        <div class="heart" style="left:45%;animation-delay:3s;">💘</div>
        <div class="heart" style="left:60%;animation-delay:1.5s;">❤️</div>
        <div class="heart" style="left:75%;animation-delay:2.5s;">💞</div>
        <div class="heart" style="left:90%;animation-delay:4s;">💖</div>
    `;
});
</script>

</body>
</html>
